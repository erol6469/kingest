<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="mRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a6fd8"/>
      <stop offset="50%" stop-color="#8bb0f0"/>
      <stop offset="100%" stop-color="#2a4a8a"/>
    </linearGradient>
    <linearGradient id="mBody" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#c0d4f0"/>
      <stop offset="40%" stop-color="#6b9fe0"/>
      <stop offset="100%" stop-color="#1e3a6e"/>
    </linearGradient>
    <linearGradient id="mShine" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="mGlow">
      <feGaussianBlur stdDeviation="2"/>
      <feComposite in2="SourceAlpha" operator="out"/>
      <feFlood flood-color="#6ba5ff" flood-opacity="0.2"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="40" cy="40" r="36" stroke="url(#mRing)" stroke-width="2" fill="none" opacity="0.6"/>
  <circle cx="40" cy="40" r="32" stroke="url(#mRing)" stroke-width="0.5" fill="none" opacity="0.25"/>

  <!-- Market lines -->
  <line x1="20" y1="54" x2="20" y2="38" stroke="#4a7ac0" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
  <line x1="24" y1="54" x2="24" y2="28" stroke="#4a7ac0" stroke-width="1.5" opacity="0.12" stroke-linecap="round"/>
  <line x1="28" y1="54" x2="28" y2="44" stroke="#4a7ac0" stroke-width="1.5" opacity="0.1" stroke-linecap="round"/>

  <!-- K -->
  <g filter="url(#mGlow)">
    <path d="M34 16 L34 64" stroke="url(#mBody)" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M36 40 L56 16" stroke="url(#mBody)" stroke-width="5" stroke-linecap="round"/>
    <path d="M36 40 L58 64" stroke="url(#mBody)" stroke-width="5" stroke-linecap="round"/>
    <path d="M34 16 L34 38" stroke="url(#mShine)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M36 40 L52 20" stroke="url(#mShine)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Diamond accent -->
  <polygon points="40,74 42.5,77 40,80 37.5,77" fill="url(#mRing)" opacity="0.4"/>
</svg>
