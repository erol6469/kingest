<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="kRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a6fd8"/>
      <stop offset="50%" stop-color="#8bb0f0"/>
      <stop offset="100%" stop-color="#2a4a8a"/>
    </linearGradient>
    <linearGradient id="kBody" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#c0d4f0"/>
      <stop offset="40%" stop-color="#6b9fe0"/>
      <stop offset="100%" stop-color="#1e3a6e"/>
    </linearGradient>
    <linearGradient id="kShine" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ab4ec"/>
      <stop offset="50%" stop-color="#d0e0f4"/>
      <stop offset="100%" stop-color="#7aa0d8"/>
    </linearGradient>
    <linearGradient id="tagGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a6a9a"/>
      <stop offset="100%" stop-color="#6888b8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="3"/>
      <feComposite in2="SourceAlpha" operator="out"/>
      <feFlood flood-color="#6ba5ff" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Emblem: Ring -->
  <circle cx="40" cy="40" r="34" stroke="url(#kRing)" stroke-width="2.5" fill="none" opacity="0.7"/>
  <circle cx="40" cy="40" r="30" stroke="url(#kRing)" stroke-width="0.5" fill="none" opacity="0.3"/>

  <!-- Subtle market lines inside ring -->
  <line x1="22" y1="52" x2="22" y2="38" stroke="#4a7ac0" stroke-width="1.2" opacity="0.2" stroke-linecap="round"/>
  <line x1="26" y1="52" x2="26" y2="30" stroke="#4a7ac0" stroke-width="1.2" opacity="0.15" stroke-linecap="round"/>
  <line x1="30" y1="52" x2="30" y2="42" stroke="#4a7ac0" stroke-width="1.2" opacity="0.12" stroke-linecap="round"/>

  <!-- K monogram -->
  <g filter="url(#outerGlow)">
    <!-- K vertical stroke -->
    <path d="M34 18 L34 62" stroke="url(#kBody)" stroke-width="5" stroke-linecap="round"/>
    <!-- K diagonal upper -->
    <path d="M36 40 L54 18" stroke="url(#kBody)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- K diagonal lower -->
    <path d="M36 40 L56 62" stroke="url(#kBody)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Shine overlay on K -->
    <path d="M34 18 L34 38" stroke="url(#kShine)" stroke-width="2" stroke-linecap="round"/>
    <path d="M36 40 L50 22" stroke="url(#kShine)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Small accent diamond at bottom of ring -->
  <polygon points="40,72 43,76 40,80 37,76" fill="url(#kRing)" opacity="0.5"/>

  <!-- KINGEST wordmark -->
  <text x="88" y="48" font-family="'SF Pro Display', -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="800" letter-spacing="5" fill="url(#wordGrad)">KINGEST</text>

  <!-- Subtle line under wordmark -->
  <line x1="88" y1="56" x2="290" y2="56" stroke="url(#tagGrad)" stroke-width="0.5" opacity="0.4"/>

  <!-- Tagline -->
  <text x="88" y="68" font-family="'SF Pro Display', -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="500" letter-spacing="3.5" fill="url(#tagGrad)" opacity="0.7">TOKENIZED STOCK TRADING</text>
</svg>
